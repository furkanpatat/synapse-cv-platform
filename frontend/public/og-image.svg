<?xml version="1.0" encoding="UTF-8"?>
<!--
  Synapse OG image — 1200x630, the size LinkedIn/Twitter/Slack expect.
  SVG keeps the repo tiny and stays crisp at any preview density.
  If a platform refuses SVG previews (some still do), generate a PNG
  fallback once with: rsvg-convert -w 1200 og-image.svg > og-image.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="100%" stop-color="#17171c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80,180)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="96" font-weight="800" fill="url(#brand)">Synapse</text>
    <text x="0" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="44" font-weight="600" fill="#ededf0">AI ile CV Doğrulama</text>
    <text x="0" y="170" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" fill="#b4b4bb">GitHub kanıtıyla her yetkinliği eşleştir.</text>
    <text x="0" y="210" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" fill="#b4b4bb">Mülakat hazırlığı + gerçek görüşme + AI değerlendirme.</text>
  </g>
  <g transform="translate(80,540)">
    <circle cx="12" cy="12" r="8" fill="#10b981"/>
    <text x="32" y="20" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" fill="#7b7b85">synapse — bitirme projesi</text>
  </g>
</svg>
