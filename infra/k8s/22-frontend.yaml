# Next.js frontend — production build runs `next start` on port 3000.
# Stateless, scale freely.

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cv-platform
  labels: { app: frontend }
spec:
  selector: { app: frontend }
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cv-platform
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/cvp-frontend:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: frontend-config }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
