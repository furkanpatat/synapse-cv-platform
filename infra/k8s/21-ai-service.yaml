# ai-service (FastAPI, port 8000). Single replica — sentence-transformers
# model loads in memory (~500 MB) and is happy single-threaded. Scale by
# running multiple pods behind the Service when traffic warrants it.

apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: cv-platform
  labels: { app: ai-service }
spec:
  selector: { app: ai-service }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: cv-platform
spec:
  replicas: 1
  selector: { matchLabels: { app: ai-service } }
  template:
    metadata:
      labels: { app: ai-service }
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/your-org/cvp-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: ai-service-config }
            - secretRef: { name: ai-service-secrets }
          readinessProbe:
            httpGet: { path: /ping, port: 8000 }
            initialDelaySeconds: 30   # model load is slow first time
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: 8000 }
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests: { cpu: 500m, memory: 1.5Gi }
            limits:   { cpu: 2000m, memory: 3Gi }
