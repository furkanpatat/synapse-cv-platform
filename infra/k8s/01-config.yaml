# Non-secret config (URLs, ports, plan prices). Secrets (JWT, DB
# passwords, GEMINI_API_KEY, IYZICO_SECRET) live in 02-secrets.yaml —
# replace the placeholder values with real ones before applying, or
# better: pipe through SealedSecrets / ExternalSecrets in CI.

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: cv-platform
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8080"
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: cvplatform
  POSTGRES_USER: cvp
  MONGO_HOST: mongo
  MONGO_PORT: "27017"
  MONGO_DB: cvplatform
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: cvp
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: http://minio:9000
  MINIO_BUCKET: cv-files
  AI_SERVICE_BASE_URL: http://ai-service:8000
  CORS_ALLOWED_ORIGINS: https://synapse.example.com
  IYZICO_BASE_URL: https://sandbox-api.iyzipay.com
  IYZICO_CALLBACK_URL: https://api.synapse.example.com/api/v1/billing/iyzico/callback
  IYZICO_FRONTEND_SUCCESS: https://synapse.example.com/dashboard/billing?upgraded=1
  IYZICO_FRONTEND_FAILURE: https://synapse.example.com/dashboard/billing?payment=failed
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-service-config
  namespace: cv-platform
data:
  CORS_ALLOWED_ORIGINS: '["https://synapse.example.com"]'
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: cv-platform
data:
  NEXT_PUBLIC_API_BASE_URL: https://api.synapse.example.com/api
  NEXT_PUBLIC_WS_URL: https://api.synapse.example.com/api/ws
