# Example only — DO NOT apply this file with the placeholder values.
# Either: (a) copy to 02-secrets.yaml, fill in real values, and
# `kubectl apply -f infra/k8s/02-secrets.yaml`; or (b) generate sealed
# secrets via `kubeseal` and commit the encrypted variant.
#
# .gitignore should keep the real `02-secrets.yaml` out of source.

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: cv-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me-postgres
  MONGO_PASSWORD: change-me-mongo
  RABBITMQ_PASSWORD: change-me-rabbit
  REDIS_PASSWORD: change-me-redis
  MINIO_ROOT_USER: cvp
  MINIO_ROOT_PASSWORD: change-me-minio
  JWT_SECRET: change-me-jwt-must-be-at-least-32-bytes-long
  GEMINI_API_KEY: change-me-gemini
  GITHUB_TOKEN: ""              # optional — boosts the analyse quota
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  IYZICO_API_KEY: sandbox-XXXXX
  IYZICO_SECRET_KEY: sandbox-XXXXX
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-service-secrets
  namespace: cv-platform
type: Opaque
stringData:
  GEMINI_API_KEY: change-me-gemini
  GITHUB_TOKEN: ""
  MONGO_USER: cvp
  MONGO_PASSWORD: change-me-mongo
  MINIO_ROOT_USER: cvp
  MINIO_ROOT_PASSWORD: change-me-minio
  RABBITMQ_USER: cvp
  RABBITMQ_PASSWORD: change-me-rabbit
---
# Used by the nightly backup + archive CronJobs (40-backups.yaml,
# 41-audit-archive.yaml). Real S3, or any S3-compatible store
# (Backblaze B2, Wasabi, Cloudflare R2, MinIO with a public endpoint).
apiVersion: v1
kind: Secret
metadata:
  name: backup-secrets
  namespace: cv-platform
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: change-me-aws-key
  AWS_SECRET_ACCESS_KEY: change-me-aws-secret
  AWS_DEFAULT_REGION: eu-central-1
  BACKUP_BUCKET: s3://synapse-backups
