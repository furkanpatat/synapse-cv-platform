# Stateful-ish supporting services — Redis (cache + token bucket),
# RabbitMQ (analysis queue), MinIO (CV / avatar object store). All
# small single-replica deployments here; production would scale RabbitMQ
# to a quorum cluster and replace MinIO with managed S3.

# ── Redis ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: cv-platform }
spec:
  selector: { app: redis }
  ports: [{ name: redis, port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: cv-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: backend-secrets, key: REDIS_PASSWORD }
          ports: [{ containerPort: 6379 }]
---
# ── RabbitMQ ──────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata: { name: rabbitmq, namespace: cv-platform }
spec:
  selector: { app: rabbitmq }
  ports:
    - { name: amqp, port: 5672, targetPort: 5672 }
    - { name: management, port: 15672, targetPort: 15672 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: rabbitmq, namespace: cv-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: rabbitmq } }
  template:
    metadata: { labels: { app: rabbitmq } }
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom: { configMapKeyRef: { name: backend-config, key: RABBITMQ_USER } }
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom: { secretKeyRef: { name: backend-secrets, key: RABBITMQ_PASSWORD } }
          ports:
            - { containerPort: 5672 }
            - { containerPort: 15672 }
---
# ── MinIO ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata: { name: minio, namespace: cv-platform }
spec:
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: minio, namespace: cv-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: backend-secrets, key: MINIO_ROOT_USER } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: backend-secrets, key: MINIO_ROOT_PASSWORD } }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: minio-data, namespace: cv-platform }
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 20Gi } }
