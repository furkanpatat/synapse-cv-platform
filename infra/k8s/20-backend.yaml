# Backend (Spring Boot, port 8080). 2 replicas with rolling update so
# deploys never drop the API. HPA scales between 2 and 8 pods based on
# average CPU; tune for your traffic profile.

apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cv-platform
  labels: { app: backend }
spec:
  selector: { app: backend }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cv-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector: { matchLabels: { app: backend } }
  template:
    metadata:
      labels: { app: backend }
      annotations:
        # Scraped by the in-cluster Prometheus operator if you run one.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: backend
          # Build & push with `mvn jib:build` or `docker build -t ...` —
          # replace this with your registry path.
          image: ghcr.io/your-org/cvp-backend:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: backend-config }
            - secretRef: { name: backend-secrets }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1000m, memory: 1Gi }
---
# Horizontal Pod Autoscaler — keep average CPU near 60% on each pod.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: cv-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
