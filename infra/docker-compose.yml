services:
  postgres:
    image: postgres:16-alpine
    container_name: cvp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cvp
      POSTGRES_PASSWORD: cvp_dev_pass
      POSTGRES_DB: cvplatform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: cvp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: cvp
      MONGO_INITDB_ROOT_PASSWORD: cvp_dev_pass
      MONGO_INITDB_DATABASE: cvplatform
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cvp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cvp
      RABBITMQ_DEFAULT_PASS: cvp_dev_pass
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: cvp-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "cvp_dev_pass"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cvp-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"      # SMTP
      - "8025:8025"      # Web UI

  minio:
    image: minio/minio:latest
    container_name: cvp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cvp
      MINIO_ROOT_PASSWORD: cvp_dev_pass
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Console UI
    volumes:
      - minio_data:/data

  # ── Observability stack ─────────────────────────────────────────
  # Prometheus scrapes Spring Actuator's /actuator/prometheus every
  # 15 s. Grafana is preconfigured with the Prometheus datasource and
  # a starter dashboard (HTTP req rate + p95 latency + JVM mem).
  prometheus:
    image: prom/prometheus:latest
    container_name: cvp-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager

  # AlertManager — fans Prometheus alerts out to Slack (and PagerDuty in
  # prod). Webhook URL is read from SLACK_WEBHOOK_URL env var.
  alertmanager:
    image: prom/alertmanager:latest
    container_name: cvp-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/REPLACE/ME/WITH-REAL-URL}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"

  # Loki — log aggregator. Backend pods ship logs via Promtail; Grafana
  # has Loki added as a datasource so you can grep by service/level.
  loki:
    image: grafana/loki:latest
    container_name: cvp-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  # Promtail — tails docker container logs and ships them to Loki.
  # Reads /var/lib/docker/containers (mounted RO) and tags by container
  # name so we can filter "logs from cvp-backend" in Grafana.
  promtail:
    image: grafana/promtail:latest
    container_name: cvp-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: cvp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: cvp
      GF_SECURITY_ADMIN_PASSWORD: cvp_dev_pass
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"      # avoid clash with the Next.js dev server

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data:
  redis_data:
  minio_data:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:
