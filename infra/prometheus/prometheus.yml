# Prometheus scrape config for the local dev compose. The Spring backend
# exposes /actuator/prometheus on host port 8080; we reach it from the
# Prometheus container via host.docker.internal so the backend can keep
# running on the host JVM (./mvnw spring-boot:run) while the stack is in
# Docker. macOS + Docker Desktop resolves host.docker.internal out of the
# box; Linux users add `--add-host=host.docker.internal:host-gateway` to
# the Prometheus service.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: cv-platform
    env: dev

# Where alerts go once Prometheus decides to fire.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert rule files — see alerts.yml for the 4 rules we currently page on.
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: cvp-backend
    # Spring 'server.servlet.context-path: /api' eklediği için actuator
    # gerçekte /api/actuator/prometheus altında. Bunu unutmamak lazım —
    # context path olmadan /actuator/prometheus 404 döner.
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: backend

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
