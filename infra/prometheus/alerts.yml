# Prometheus alert rules — the four signals worth paging an operator
# at 3 am for. Loaded by prometheus via the `rule_files:` directive in
# prometheus.yml.
#
# `for: 5m` on every rule so a single transient blip doesn't fire.
# `severity` label drives AlertManager routing (page vs slack-only).

groups:
  - name: synapse-backend
    interval: 30s
    rules:
      # 1) Sustained 5xx rate above 5 % of all requests over 5 minutes.
      #    Catches the "deploy broke something, every endpoint 500s" case.
      - alert: HighErrorRate
        expr: |
          100 * (
            sum(rate(http_server_requests_seconds_count{application="cv-platform-backend",status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{application="cv-platform-backend"}[5m]))
          ) > 5
        for: 5m
        labels:
          severity: page
          service: backend
        annotations:
          summary: "Backend 5xx error rate >5% for 5 minutes"
          description: "Current: {{ $value | printf \"%.1f\" }}% — check recent deploys + downstream services."

      # 2) p95 latency on an endpoint above 2 s. Aggregate to URI so a
      #    single slow endpoint shows up named in the alert.
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            sum by (le, uri) (
              rate(http_server_requests_seconds_bucket{application="cv-platform-backend"}[5m])
            )
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "p95 latency >2 s on {{ $labels.uri }}"
          description: "p95={{ $value | printf \"%.2f\" }} s — likely Gemini API slowness or DB lock."

      # 3) JVM heap above 90 % committed. Pre-OOM warning so we can
      #    rolling-restart before the pod gets killed.
      - alert: JvmHeapAlmostFull
        expr: |
          (sum(jvm_memory_used_bytes{application="cv-platform-backend",area="heap"})
           / sum(jvm_memory_max_bytes{application="cv-platform-backend",area="heap"})) > 0.90
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "JVM heap >90% for 10 minutes"
          description: "Probably a memory leak; check Grafana heap chart + GC pauses."

      # 4) Backend Prometheus target missing for 2 minutes — the actuator
      #    endpoint stopped responding (process down, OOM-kill, deadlock).
      - alert: BackendDown
        expr: up{job="cvp-backend"} == 0
        for: 2m
        labels:
          severity: page
          service: backend
        annotations:
          summary: "Backend is DOWN (no metrics scrape for 2 min)"
          description: "Pod likely crashed. Check `kubectl logs deploy/backend`."
