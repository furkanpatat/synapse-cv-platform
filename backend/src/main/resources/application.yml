server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: cv-platform-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/cvplatform
    username: ${POSTGRES_USER:cvp}
    password: ${POSTGRES_PASSWORD:cvp_dev_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: mongodb://${MONGO_USER:cvp}:${MONGO_PASSWORD:cvp_dev_pass}@localhost:27017/${MONGO_DB:cvplatform}?authSource=admin
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:cvp_dev_pass}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:cvp}
    password: ${RABBITMQ_PASSWORD:cvp_dev_pass}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  admin:
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL:admin@cv.local}
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:change-me-admin}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:cvp}
    secret-key: ${MINIO_ROOT_PASSWORD:cvp_dev_pass}
    bucket: ${MINIO_BUCKET:cv-files}
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://localhost:8000}
    timeout-seconds: 60
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-in-prod-must-be-long-enough-for-hmac-sha256}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: http://localhost:3000
  mail:
    from: noreply@cvplatform.local
  frontend:
    base-url: http://localhost:3000
  iyzico:
    api-key: ${IYZICO_API_KEY:}
    secret-key: ${IYZICO_SECRET_KEY:}
    base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
    callback-url: ${IYZICO_CALLBACK_URL:http://localhost:8080/api/v1/billing/iyzico/callback}
    frontend-success-url: ${IYZICO_FRONTEND_SUCCESS:http://localhost:3000/dashboard/billing?upgraded=1}
    frontend-failure-url: ${IYZICO_FRONTEND_FAILURE:http://localhost:3000/dashboard/billing?payment=failed}
    premium-price: 99.00
    enterprise-price: 499.00
  oauth:
    frontend-redirect: http://localhost:3000/oauth/finish
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/google/callback}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth/github/callback}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.cvplatform: DEBUG
