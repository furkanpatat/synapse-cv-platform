server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: cv-platform-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/cvplatform
    username: ${POSTGRES_USER:cvp}
    password: ${POSTGRES_PASSWORD:cvp_dev_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: mongodb://${MONGO_USER:cvp}:${MONGO_PASSWORD:cvp_dev_pass}@localhost:27017/${MONGO_DB:cvplatform}?authSource=admin
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:cvp_dev_pass}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:cvp}
    password: ${RABBITMQ_PASSWORD:cvp_dev_pass}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-in-prod-must-be-long-enough-for-hmac-sha256}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  cors:
    allowed-origins: http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.cvplatform: DEBUG
