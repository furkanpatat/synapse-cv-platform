name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: ./mvnw -B -q -DskipTests compile

      # Unit tests are hermetic (mocked deps, no Docker required) — they
      # cover TotpService, AiContentDetector, AuditService, MockInterview,
      # CvService. Integration tests with @SpringBootTest / Testcontainers
      # would need a Postgres container; left out of CI for now to keep
      # the pipeline fast.
      - name: Unit tests
        run: ./mvnw -B test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Next.js build
        # Skip env-dependent steps; we only want to know the bundle compiles.
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
