name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: ./mvnw -B -q -DskipTests compile

      # Unit tests are hermetic (mocked deps, no Docker required) — they
      # cover TotpService, AiContentDetector, AuditService, MockInterview,
      # CvService. Integration tests with @SpringBootTest / Testcontainers
      # would need a Postgres container; left out of CI for now to keep
      # the pipeline fast.
      - name: Unit tests + Jacoco coverage
        # `verify` runs test + the jacoco:check coverage floor (15%).
        # A regression that pushes coverage below the floor fails the build.
        run: ./mvnw -B verify

      - name: Upload Jacoco coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        # Pure utility tests (redirect-by-role, transcript-cleanup).
        # Fast — completes in well under a second.
        run: npm test

      - name: Next.js build
        # Skip env-dependent steps; we only want to know the bundle compiles.
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # ── Image build + push to GHCR ─────────────────────────────────
  # Runs on pushes to main only. Three images go up:
  #   ghcr.io/<owner>/cvp-backend:<sha>     + :latest
  #   ghcr.io/<owner>/cvp-ai-service:<sha>  + :latest
  #   ghcr.io/<owner>/cvp-frontend:<sha>    + :latest
  # Uses buildx + GHA cache so subsequent builds reuse layers.
  images:
    name: Build + push Docker images
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: ./backend
            image: cvp-backend
          - context: ./ai-service
            image: cvp-ai-service
          - context: ./frontend
            image: cvp-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # NEXT_PUBLIC_* values must be present at build time for the
          # frontend image — set them as repo-level vars.
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
