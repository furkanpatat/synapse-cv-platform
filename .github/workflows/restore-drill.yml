name: Restore drill

# Weekly self-test that proves the nightly Postgres + Mongo backups can
# actually be restored. Skips silently if the BACKUP_BUCKET secret isn't
# configured (dev forks).
on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:      # also runnable on demand from the Actions tab

jobs:
  drill:
    name: Restore drill (Postgres + Mongo)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install postgres client + aws cli
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client awscli
          aws --version
          psql --version

      - name: Run drill
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ vars.AWS_DEFAULT_REGION }}
          BACKUP_BUCKET:         ${{ vars.BACKUP_BUCKET }}
          POSTGRES_USER:         ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD:     ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:           ${{ vars.POSTGRES_DB }}
          MONGO_USER:            ${{ vars.MONGO_USER }}
          MONGO_PASSWORD:        ${{ secrets.MONGO_PASSWORD }}
          MONGO_DB:              ${{ vars.MONGO_DB }}
        run: ./infra/scripts/restore-drill.sh
